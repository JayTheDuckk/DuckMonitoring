version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: duck_monitoring
      POSTGRES_USER: duck_db_user
      POSTGRES_PASSWORD: duck_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U duck_db_user -d duck_monitoring" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://duck_db_user:duck_db_password@db:5432/duck_monitoring
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.docker_data/backend_static:/app/static
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
